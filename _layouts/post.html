---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <time datetime="{{ page.date | date_to_xmlschema }}">
    {{ page.date | date: "%Y-%m-%d" }}
  </time>
  {% if page.tags.size > 0 %}
  <div class="tags">
    {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  </div>
  {% endif %}
  <div class="content">
    {{ content }}
  </div>
</article>
